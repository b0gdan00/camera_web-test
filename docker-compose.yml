services:
  # ── Ngrok Tunnel (connects to Flask running on host) ──
  ngrok:
    image: ngrok/ngrok:latest
    container_name: picam-ngrok
    restart: unless-stopped
    network_mode: host
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command:
      - "http"
      - "http://localhost:5000"
