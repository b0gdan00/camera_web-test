<header>
    <div class="logo">
        <div class="logo-icon">
            <svg viewBox="0 0 24 24"><path d="M17 10.5V7c0-.55-.45-1-1-1H4c-.55 0-1 .45-1 1v10c0 .55.45 1 1 1h12c.55 0 1-.45 1-1v-3.5l4 4v-11l-4 4z"/></svg>
        </div>
        <span>PiCam Stream</span>
    </div>
    <div class="header-center" id="viewersBar">
        <span class="viewers-label">Watching:</span>
        <span class="viewers-inline" id="viewersInline"></span>
        <button class="viewers-toggle" id="viewersToggle" onclick="toggleViewersDropdown()">
            <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
            <span id="viewersCount">0</span> online
        </button>
        <div class="viewers-dropdown" id="viewersDropdown">
            <div class="viewers-dropdown-title">Viewers online</div>
            <div id="viewersDropdownList"></div>
        </div>
    </div>
    <div class="header-right">
        <div class="status-badge" id="statusBadge">
            <span class="status-dot"></span>
            <span id="statusText">Connected</span>
        </div>
        <button class="leave-btn" id="leaveBtn" onclick="leaveStream()" style="display:none">
            <svg viewBox="0 0 24 24"><path d="M10.09 15.59L11.5 17l5-5-5-5-1.41 1.41L12.67 11H3v2h9.67l-2.58 2.59zM19 3H5c-1.11 0-2 .9-2 2v4h2V5h14v14H5v-4H3v4c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2z"/></svg>
            Leave
        </button>
    </div>
</header>
